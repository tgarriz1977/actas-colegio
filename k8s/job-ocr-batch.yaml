apiVersion: batch/v1
kind: Job
metadata:
  name: ocr-batch-job
  namespace: actas-colegio
  labels:
    app: ocr-batch
spec:
  template:
    metadata:
      labels:
        app: ocr-batch
    spec:
      containers:
      - name: processor
        image: registry.cluster.local/actas-colegio/docling:latest
        imagePullPolicy: Always
        command: ["python", "-m", "scripts.batch_process"]
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"
        volumeMounts:
        - name: pdfs
          mountPath: /app/ActasColegio
          readOnly: true
        - name: output
          mountPath: /app/output
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: MAX_WORKERS
          value: "4"
      volumes:
      - name: pdfs
        persistentVolumeClaim:
          claimName: actas-pdfs-pvc
      - name: output
        persistentVolumeClaim:
          claimName: actas-output-pvc
      restartPolicy: Never
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
