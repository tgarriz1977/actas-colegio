apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-ocr
  namespace: actas-colegio
  labels:
    app: docling-ocr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docling-ocr
  template:
    metadata:
      labels:
        app: docling-ocr
    spec:
      containers:
      - name: docling
        image: registry.cluster.local/actas-colegio/docling:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: pdfs
          mountPath: /app/ActasColegio
          readOnly: true
        - name: output
          mountPath: /app/output
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OMP_NUM_THREADS
          value: "4"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import docling; print('OK')"
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import docling; print('OK')"
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: pdfs
        persistentVolumeClaim:
          claimName: actas-pdfs-pvc
      - name: output
        persistentVolumeClaim:
          claimName: actas-output-pvc
      restartPolicy: Always
